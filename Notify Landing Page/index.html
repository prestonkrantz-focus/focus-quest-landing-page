<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cove — coming soon</title>
<meta name="description" content="Cove is coming soon for doomscrollers. The otter will hold your phone for you.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F172A;
    --ink:#F1F5F9;
    --ocean:#38BDF8;
    --muted:rgba(241, 245, 249, 0.6);
    --line:rgba(255, 255, 255, 0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Instrument Sans',ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    height:100vh;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    text-align:center;
    padding:32px;
    overflow:hidden;
  }
  
  .wordmark{
    font-family:'Instrument Serif',serif;font-style:italic;
    font-size:32px;letter-spacing:-.02em;line-height:1;
    color:var(--ink);text-decoration:none;
    margin-bottom:60px;
    animation: fade-up 0.8s ease forwards;
  }
  .wordmark .dot{
    display:inline-block;width:6px;height:6px;
    background:var(--ocean);border-radius:50%;
    vertical-align:baseline;margin-left:2px;transform:translateY(-4px);
  }

  .content{
    max-width:480px;
    animation: fade-up 0.8s ease 0.2s forwards;
    opacity:0;
  }

  h1{
    font-family:'Instrument Serif',serif;font-style:italic;
    font-size:clamp(40px, 8vw, 72px);
    font-weight:400;line-height:0.95;letter-spacing:-.04em;
    margin-bottom:24px;
  }
  h1 em{font-style:italic;color:var(--ocean)}

  p{
    font-size:18px;color:var(--muted);
    margin-bottom:40px;letter-spacing:-.01em;
  }

  /* ── OTTER MOCKUP ── */
  .mockup-wrap{
    position:relative;
    width:400px;
    height:400px;
    margin:0 auto 0px;
    animation: float 6s ease-in-out infinite;
    
    /* SOFT MASK to hide square edges */
    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 60%, transparent 95%);
    mask-image: radial-gradient(circle at 50% 50%, black 60%, transparent 95%);
  }
  .otter-img{
    width:100%;height:100%;
    object-fit: contain;
    display:block;
  }
  
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-15px)}
  }

  /* ── FORM ── */
  .form{
    display:flex;gap:8px;background:#fff;padding:6px;
    border-radius:100px;width:100%;
    margin-bottom:12px;
  }
  .form input{
    flex:1;border:0;background:transparent;outline:none;
    padding:12px 20px;font:inherit;font-size:16px;
    color:#0F172A;min-width:0;
  }
  .form button{
    border:0;background:var(--bg);color:var(--ink);
    padding:12px 24px;border-radius:100px;
    font:inherit;font-size:14px;cursor:pointer;
    transition: opacity 0.2s;
  }
  .form button:hover{opacity:0.9}
  .form button:disabled{opacity:0.5;cursor:default}

  .success-msg{
    display:none;font-family:'Instrument Serif',serif;font-style:italic;
    font-size:22px;color:var(--ocean);
  }

  footer{
    position:absolute;bottom:40px;
    display:flex;gap:24px;font-size:13px;
  }
  footer a{color:var(--muted);text-decoration:none;transition:color 0.2s}
  footer a:hover{color:var(--ink)}

  #ml-frame{display:none}

  @keyframes fade-up{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:none}
  }

  @media(max-width:480px){
    h1{font-size:48px}
    .form{flex-direction:column;background:transparent;padding:0}
    .form input{background:#fff;border-radius:100px;margin-bottom:8px}
    .form button{width:100%;padding:16px}
  }
</style>
</head>
<body>

<a href="/" class="wordmark">cove<span class="dot"></span></a>

<div class="content">
  <div class="mockup-wrap">
    <img src="otter-iphone.png" class="otter-img" alt="cove coming soon" 
         onerror="this.src='otter-peek.png'; this.onerror=null;">
  </div>

  <h1>coming soon.</h1>
  <p>doomscrolling ends here.</p>

  <form class="form" id="waitlist-form" 
        action="https://assets.mailerlite.com/forms/184049393692836944/subscribe"
        method="POST" target="ml-frame">
    <input type="hidden" name="ml-submit" value="1">
    <input type="email" name="fields[email]" placeholder="your@email.com" required>
    <button type="submit" id="submit-btn">join the waitlist</button>
  </form>
  <div class="success-msg" id="success-msg">you're on the list. 🦦</div>
</div>

<footer>
  <a href="/privacy.html">privacy</a>
  <a href="/terms.html">terms</a>
  <a href="mailto:hello@usecove.app">hello@usecove.app</a>
</footer>

<iframe id="ml-frame" name="ml-frame"></iframe>

<script>
  const form = document.getElementById('waitlist-form');
  const btn = document.getElementById('submit-btn');
  const success = document.getElementById('success-msg');
  
  form.addEventListener('submit', () => {
    btn.disabled = true;
    btn.textContent = 'joining...';
    
    // Fallback if the iframe doesn't trigger load quickly
    setTimeout(() => {
      form.style.display = 'none';
      success.style.display = 'block';
    }, 2000);
  });
</script>

</body>
</html>
